[pytest]
testpaths = tests
asyncio_mode = auto
python_files = test_*.py
python_classes = Test*
python_functions = test_*
# Show short tracebacks and suppress noisy warnings from third-party libs
addopts = --tb=short -q
filterwarnings =
    ignore::DeprecationWarning:pydantic.*
    ignore::DeprecationWarning:jose.*
